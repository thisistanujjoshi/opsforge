name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  terraform:
    name: Terraform fmt & validate (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, staging, prod]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: fmt check
        run: terraform fmt -check -recursive infra
      - name: init (no backend)
        working-directory: infra/envs/${{ matrix.env }}
        run: terraform init -backend=false
      - name: validate
        working-directory: infra/envs/${{ matrix.env }}
        run: terraform validate

  control-plane:
    name: Control-plane build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Test
        run: dotnet test control-plane/ControlPlane.Tests -c Release --logger "trx;LogFileName=results.trx"

  security-scan:
    name: Trivy scan (vuln + IaC misconfig)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Report-only for now: surfaces CRITICAL/HIGH vulnerabilities and Terraform/
      # compose misconfigurations in the job log without failing the build.
      # Gate (exit-code: 1) once the baseline is triaged — see docs/pipeline-comparison.md.
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scanners: vuln,misconfig
          severity: CRITICAL,HIGH
          exit-code: 0
