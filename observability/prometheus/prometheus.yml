global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["host.docker.internal:5100"]
  - job_name: catalog
    static_configs:
      - targets: ["host.docker.internal:5101"]
  - job_name: orders
    static_configs:
      - targets: ["host.docker.internal:5102"]
  - job_name: notifications
    static_configs:
      - targets: ["host.docker.internal:5103"]
  - job_name: aisupport
    static_configs:
      - targets: ["host.docker.internal:5104"]
